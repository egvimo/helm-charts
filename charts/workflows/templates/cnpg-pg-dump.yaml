apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: cnpg-pg-dump
spec:
  schedule: {{ .Values.cnpgPgDump.schedule | quote }}
  concurrencyPolicy: Forbid
  timezone: {{ .Values.timezone | quote }}

  workflowSpec:
    entrypoint: pg-dump
    serviceAccountName: argo-workflow
    parallelism: 2

    templates:
      - name: pg-dump
        dag:
          tasks:
          - name: list-databases
            template: list-databases

      - name: list-databases
        script:
          image: postgres:18-alpine
          command: [bash]
          source: |
            set -e
            echo "Fetching list of databases..."
            DBS=$(psql -h {{ .Values.cnpgPgDump.host }} -U postgres -d postgres -t -A \
                      -c "SELECT datname FROM pg_database WHERE datistemplate = false AND datname NOT IN ('postgres');")
            echo "Found databases: $DBS"
            echo $DBS
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cnpgPgDump.superuserSecretName }}
                  key: password
