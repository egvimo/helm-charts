apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "common.fullname" . }}-test-connection"
  labels:
    {{- include "common.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: aws-cli
      image: amazon/aws-cli
      env:
        - name: AWS_ACCESS_KEY_ID
          value: {{ .Values.s3proxy.identity | quote }}
        - name: AWS_SECRET_ACCESS_KEY
          value: {{ .Values.s3proxy.credential | quote }}
        - name: AWS_DEFAULT_REGION
          value: "eu-central-1"
      args: ['s3', 'ls', '--endpoint-url', 'http://{{ include "common.fullname" . }}:{{ .Values.service.port }}']
  restartPolicy: Never
