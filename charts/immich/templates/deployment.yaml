{{- include "common.deployment" (list . "immich.deployment") -}}
{{- define "immich.deployment" -}}
spec:
  template:
    spec:
      containers:
        - env:
            - name: TZ
              value: {{ .Values.timezone | quote }}
            - name: IMMICH_CONFIG_FILE
              value: /config/immich-config.yaml
            - name: DB_HOSTNAME
              value: {{ .Values.database.hostname | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_DATABASE_NAME
              value: {{ .Values.database.databaseName | quote }}
            - name: DB_USERNAME
              value: {{ .Values.database.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.passwordSecretName }}
                  key: password
            - name: IMMICH_MACHINE_LEARNING_URL
              value: http://immich-machine-learning:3003  # TODO
            - name: REDIS_HOSTNAME
              value: immich-valkey  # TODO
          ports:
            - name: http
              containerPort: 2283
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/server/ping
              port: http
          readinessProbe:
            httpGet:
              path: /api/server/ping
              port: http
          startupProbe:
            httpGet:
              path: /api/server/ping
              port: http
            failureThreshold: 30
          volumeMounts:
            - name: configuration
              mountPath: /config
            - name: data
              mountPath: /data
          {{- include "common.container" . | nindent 10 }}
      volumes:
        - name: configuration
          configMap:
            name: {{ include "common.fullname" . }}
        - name: data
          hostPath:
            path: {{ .Values.library.hostPath }}
            type: Directory
{{- end -}}
