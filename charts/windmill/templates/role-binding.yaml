apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ template "windmill.serviceAccountName" (dict "Values" .Values.windmill "Release" .Release "Chart" .Chart) }}-job-runner-binding
subjects:
  - kind: ServiceAccount
    name: {{ template "windmill.serviceAccountName" (dict "Values" .Values.windmill "Release" .Release "Chart" .Chart) }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: {{ template "windmill.serviceAccountName" (dict "Values" .Values.windmill "Release" .Release "Chart" .Chart) }}-job-runner
