{{- include "common.deployment" (list . "webhook-bridge.deployment") -}}
{{- define "webhook-bridge.deployment" -}}
spec:
  template:
    spec:
      containers:
        - env:
            - name: APPRISE_URL
              value: {{ .Values.appriseUrl | quote }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /status
              port: http
          readinessProbe:
            httpGet:
              path: /status
              port: http
          {{- include "common.container" . | nindent 10 }}
{{- end -}}
