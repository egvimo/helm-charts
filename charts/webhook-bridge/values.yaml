replicaCount: 1

image:
  repository: ghcr.io/egvimo/webhook-bridge
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to chart appVersion

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    memory: "32Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "500m"

nodeSelector: {}

tolerations: []

affinity: {}

serviceMonitor:
  enabled: true

appriseUrl: "http://apprise.apprise.svc.cluster.local/notify/apprise"
