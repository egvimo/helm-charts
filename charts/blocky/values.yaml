replicaCount: 2

image:
  repository: ghcr.io/0xerr0r/blocky
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to chart appVersion

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 11319
  runAsGroup: 11319
  fsGroup: 11319
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  privileged: false
  readOnlyRootFilesystem: true

service:
  type: LoadBalancer

resources:
  requests:
    cpu: 200m
    memory: 64Mi
  limits:
    cpu: 2000m
    memory: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}

timezone: "Europe/Berlin"

serviceMonitor:
  enabled: true

config:
  upstreams:
    init:
      strategy: failOnError
    groups:
      default:
        - 49.12.67.122
        - 91.99.154.175
        - 176.9.93.198
        - 176.9.1.117
  ports:
    dns: 53
    tls: 853
    http: 4000
  blocking:
    denylists:
      default:
        - https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/wildcard/light.txt
        - https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/wildcard/tif.txt
  prometheus:
    enable: true

certManager:
  dnsName: ""
