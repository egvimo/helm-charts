{{- if and .Values.config.ports.tls .Values.certManager.dnsName }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "common.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ .Values.certManager.dnsName | quote }}
  issuerRef:
    name: letsencrypt-ionos
  secretName: {{ include "common.fullname" . }}-tls
{{- end }}
